name: Release candidate R checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: ubuntu-latest, r: devel}
          - {os: ubuntu-latest, r: release}
          - {os: macos-latest, r: release}
          - {os: windows-latest, r: release}
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} / R ${{ matrix.r }} / --as-cran
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check
      - name: Full release-image tests with zero skips
        shell: bash
        run: >-
          Rscript tools/run-release-tests.R --runs=1
          --output=artifacts/tests-${{ runner.os }}-R-${{ matrix.r }}.json
      - name: Repeat property, migration, and fault suites
        if: matrix.os == 'ubuntu-latest' && matrix.r == 'release'
        shell: bash
        run: >-
          Rscript tools/run-release-tests.R
          '--filter=property|fault|backward' --runs=5
          --output=artifacts/property-fault.json
      - uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--as-cran", "--no-manual")'
          error-on: '"note"'
      - name: Record zero-count check evidence
        shell: bash
        run: >-
          Rscript -e 'dir.create("artifacts", showWarnings=FALSE);
          jsonlite::write_json(list(contract_version="1.0", status="pass",
          errors=0L, warnings=0L, notes=0L, platform=R.version$platform,
          r_version=R.version.string),
          sprintf("artifacts/r-check-%s-R-%s.json",
          Sys.getenv("RUNNER_OS"), "${{ matrix.r }}"), auto_unbox=TRUE,
          pretty=TRUE)'
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: r-check-${{ runner.os }}-R-${{ matrix.r }}
          path: |
            artifacts/*.json
            check
          if-no-files-found: warn
