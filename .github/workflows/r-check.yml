name: Release candidate R checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: ubuntu-latest, r: devel}
          - {os: ubuntu-latest, r: release}
          - {os: macos-latest, r: release}
          - {os: windows-latest, r: release}
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} / R ${{ matrix.r }} / --as-cran
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check
      - name: Pin dependencies to renv.lock
        shell: bash
        run: Rscript tools/ci-install-locked.R
      - name: Full release-image tests with zero skips
        shell: bash
        run: >-
          Rscript tools/run-release-tests.R --runs=1
          --output=artifacts/tests-${{ runner.os }}-R-${{ matrix.r }}.json
      - name: Repeat property, migration, and fault suites
        if: matrix.os == 'ubuntu-latest' && matrix.r == 'release'
        shell: bash
        run: >-
          Rscript tools/run-release-tests.R
          '--filter=property|fault|backward' --runs=5
          --output=artifacts/property-fault.json
      - uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--as-cran", "--no-manual")'
          error-on: '"warning"'
      - name: Classify check evidence with exact NOTE allowlist
        shell: bash
        run: >-
          Rscript tools/classify-r-check.R --log=check
          --output=artifacts/r-check-${{ runner.os }}-R-${{ matrix.r }}.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: r-check-${{ runner.os }}-R-${{ matrix.r }}
          path: |
            artifacts/*.json
            check
          if-no-files-found: warn
