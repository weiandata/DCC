name: R-benchmark

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      rows:
        description: Comma-separated row scales
        default: "10000,1000000"
        required: false

permissions: read-all

jobs:
  benchmark:
    runs-on: ubuntu-latest
    name: Pipeline benchmark (regression gate)
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: check

      - name: Install package
        run: R CMD INSTALL .

      - name: Run benchmark
        env:
          DCC_BENCH_ROWS: ${{ github.event.inputs.rows || '10000,1000000' }}
          DCC_BENCH_OUT: bench-results.csv
        run: Rscript benchmarks/benchmark.R

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: bench-results.csv
          if-no-files-found: ignore
