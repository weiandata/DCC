name: Release coverage gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  coverage:
    runs-on: ubuntu-latest
    name: Overall 90 / critical areas 95
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr, any::DT, any::htmltools
          needs: coverage
      - name: Measure and enforce coverage
        run: >-
          Rscript tools/coverage-report.R
          artifacts/coverage.json artifacts/coverage.html
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-evidence
          path: artifacts/coverage.*
          if-no-files-found: error
