name: Format and encoding matrix

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  format-matrix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        r: [release]
        include:
          - os: ubuntu-latest
            r: devel
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} / R ${{ matrix.r }}
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: check
      - name: Pin dependencies to renv.lock
        shell: bash
        run: Rscript tools/ci-install-locked.R
      - name: Install DCC once
        shell: bash
        run: R CMD INSTALL .
      - name: Verify fixtures without runtime installation
        shell: bash
        run: >-
          Rscript tools/verify-format-matrix.R --local
          --output=artifacts/format-${{ runner.os }}-R-${{ matrix.r }}.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: format-${{ runner.os }}-R-${{ matrix.r }}
          path: artifacts/*.json
          if-no-files-found: error
