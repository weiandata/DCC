name: Performance and memory gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  benchmark:
    runs-on: macos-15
    timeout-minutes: 45
    name: One-million-row reference benchmark
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: check
      - name: Install DCC once
        run: R CMD INSTALL .
      - name: Capture three-run benchmark
        run: >-
          Rscript tools/benchmarks/benchmark.R --rows=1000000 --runs=3
          --output=artifacts/benchmark-current.json
      - name: Enforce memory ceiling
        run: >-
          Rscript tools/benchmarks/memory.R
          --input=artifacts/benchmark-current.json
          --output=artifacts/memory-current.json
      - name: Compare accepted like-for-like baseline
        run: >-
          Rscript tools/check-benchmarks.R
          --current=artifacts/benchmark-current.json
          --baseline=tools/benchmarks/baseline.json
          --strict-relative=false
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-${{ runner.os }}-${{ runner.arch }}
          path: artifacts/*.json
          if-no-files-found: error
